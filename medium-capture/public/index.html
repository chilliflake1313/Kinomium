<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medium Feed</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 20px auto;
      padding: 0 12px;
    }

    input {
      width: 70%;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 12px;
      font-size: 16px;
      cursor: pointer;
    }

    iframe {
      width: 100%;
      height: 80vh;
      margin-top: 20px;
      border: none;
    }

    @media (max-width: 700px) {
      input {
        width: 100%;
        margin-bottom: 10px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <h2>Medium Reader</h2>

  <input id="url" placeholder="Paste Medium URL">
  <button onclick="loadArticle()">Load</button>

  <iframe id="viewer"></iframe>

  <script>
    function loadArticle() {
      const url = document.getElementById('url').value;
      document.getElementById('viewer').src = `/capture?url=${encodeURIComponent(url)}`;
    }
  </script>

</body>
</html>
